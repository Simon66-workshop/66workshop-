name: 66TaskLight
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  TaskLightPackage:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
targets:
  66TaskLight:
    type: application
    platform: macOS
    sources:
      - path: Sources/TaskLightApp
    dependencies:
      - package: TaskLightPackage
        product: TaskLightCore
      - target: 66TaskLightWidgetExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.66tasklight
        INFOPLIST_FILE: XcodeWrapper/AppInfo.plist
        CODE_SIGN_ENTITLEMENTS: WidgetKitScaffold/66TaskLightApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
  66TaskLightWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetKitScaffold/66TaskLightWidget.swift
    dependencies:
      - package: TaskLightPackage
        product: TaskLightCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.66tasklight.widget
        INFOPLIST_FILE: WidgetKitScaffold/Info.plist
        CODE_SIGN_ENTITLEMENTS: WidgetKitScaffold/66TaskLightWidgetExtension.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
schemes:
  66TaskLight:
    build:
      targets:
        66TaskLight: all
        66TaskLightWidgetExtension: all
    run:
      config: Debug
      executable: 66TaskLight
